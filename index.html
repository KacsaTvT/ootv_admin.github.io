<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Moderációs Panel</title>
    <style>
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background: #0f172a; 
            color: #f8fafc; 
            padding: 20px; 
            margin: 0;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        h2 { 
            color: #38bdf8; 
            border-bottom: 2px solid #334155; 
            padding-bottom: 10px;
            margin-top: 0;
        }
        #list { 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
            margin-top: 20px;
        }
        .item { 
            background: #1e293b; 
            padding: 20px; 
            border-radius: 8px; 
            display: flex; 
            flex-direction: column; 
            justify-content: space-between; 
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            border-left: 5px solid #f59e0b;
        }
        @media(min-width: 480px) {
            .item {
                flex-direction: row;
                align-items: center;
            }
        }
        .content-box {
            margin-bottom: 15px;
        }
        @media(min-width: 480px) {
            .content-box {
                margin-bottom: 0;
                padding-right: 15px;
            }
        }
        .sender { 
            font-weight: bold; 
            color: #f43f5e; 
            font-size: 12pt;
        }
        .text {
            font-size: 14pt;
            margin: 5px 0;
            color: #e2e8f0;
        }
        .date { 
            font-size: 9pt; 
            color: #94a3b8; 
        }
        .actions {
            display: flex;
            gap: 10px;
            flex-shrink: 0;
        }
        .btn { 
            background: #22c55e; 
            border: none; 
            color: white; 
            padding: 10px 20px; 
            border-radius: 6px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 11pt;
            transition: background 0.2s;
        }
        .btn:hover { background: #16a34a; }
        .btn-del { background: #ef4444; }
        .btn-del:hover { background: #dc2626; }
        .empty-msg {
            color: #94a3b8;
            font-style: italic;
            text-align: center;
            margin-top: 30px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Várakozó üzenetek (Moderáció)</h2>
        <div id="list">
            <p class="empty-msg">Betöltés...</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, query, where, onSnapshot, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        // MÁSOLD IDE A SAJÁT FIREBASE CONFIG ADATAIDAT
        const firebaseConfig = { 
            apiKey: "YOUR_API_KEY", 
            authDomain: "YOUR_AUTH_DOMAIN", 
            projectId: "YOUR_PROJECT_ID" 
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Csak azokat listázzuk, amik nincsenek jóváhagyva (approved == false)
        const q = query(collection(db, "messages"), where("approved", "==", false));
        
        onSnapshot(q, (snapshot) => {
            const list = document.getElementById('list');
            list.innerHTML = "";
            
            if (snapshot.empty) {
                list.innerHTML = '<p class="empty-msg">Nincs új jóváhagyásra váró üzenet. Minden tiszta! 😊</p>';
                return;
            }
            
            snapshot.forEach((documentSnap) => {
                const data = documentSnap.data();
                const id = documentSnap.id;
                
                // Új elem létrehozása a listában
                const div = document.createElement('div');
                div.className = 'item';
                
                div.innerHTML = `
                    <div class="content-box">
                        <div class="sender">${data.name}</div>
                        <div class="text">"${data.text}"</div>
                        <div class="date">${data.date}</div>
                    </div>
                    <div class="actions">
                        <button class="btn btn-approve" data-id="${id}">TV-re küld</button>
                        <button class="btn btn-del" data-id="${id}">Töröl</button>
                    </div>
                `;
                
                list.appendChild(div);
            });

            // Gombok eseménykezelőinek dinamikus hozzáadása (biztonságosabb, mint az onclick)
            document.querySelectorAll('.btn-approve').forEach(button => {
                button.addEventListener('click', async (e) => {
                    const id = e.target.getAttribute('data-id');
                    try {
                        await updateDoc(doc(db, "messages", id), { approved: true });
                    } catch (err) {
                        alert("Hiba a jóváhagyás során: " + err.message);
                    }
                });
            });

            document.querySelectorAll('.btn-del').forEach(button => {
                button.addEventListener('click', async (e) => {
                    const id = e.target.getAttribute('data-id');
                    if(confirm("Biztosan törölni szeretnéd ezt az üzenetet?")) {
                        try {
                            await deleteDoc(doc(db, "messages", id));
                        } catch (err) {
                            alert("Hiba a törlés során: " + err.message);
                        }
                    }
                });
            });
        });
    </script>
</body>
</html>
